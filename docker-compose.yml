services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: warehouse
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d warehouse"]
      interval: 3s
      timeout: 3s
      retries: 15
      start_period: 10s

  python:
    build: ./python
    env_file: .env
    environment:
      POSTGRES_CONN: postgresql://postgres:postgres@postgres:5432/warehouse
      SRC_DIR: /app/src
    volumes:
      - ./src:/app/src
    depends_on:
      postgres:
        condition: service_healthy

  dbt:
    build: ./dbt
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: warehouse
    volumes:
      - ./dbt:/dbt
    depends_on:
      postgres:
        condition: service_healthy

  api:
    build: ./app/api
    environment:
      POSTGRES_CONN: postgresql://postgres:postgres@postgres:5432/warehouse
    ports:
      - "7654:7654"
    depends_on:
      postgres:
        condition: service_healthy

  dashboard:
    build: ./app/dashboard
    environment:
      POSTGRES_CONN: postgresql://postgres:postgres@postgres:5432/warehouse
      API_BASE: http://api:7654
    ports:
      - "8501:8501"
    volumes:
      - ./dbt/models:/app/dbt_models:ro
    depends_on:
      postgres:
        condition: service_healthy
      api:
        condition: service_started

  adminer:
    image: adminer
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy

  jupyter:
    build: ./jupyter
    ports:
      - "8888:8888"
    environment:
      POSTGRES_CONN: postgresql://postgres:postgres@postgres:5432/warehouse
    volumes:
      - ./notebooks:/home/jovyan/work
    depends_on:
      postgres:
        condition: service_healthy
    command: start-notebook.sh --NotebookApp.token='' --NotebookApp.password=''

volumes:
  postgres_data:
