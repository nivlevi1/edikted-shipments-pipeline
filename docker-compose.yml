services:
  postgres:
    image: postgres:15
    env_file: .env
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 5s
      timeout: 5s
      retries: 10

  python:
    build: ./python
    env_file: .env
    environment:
      POSTGRES_CONN: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-warehouse}
      SRC_DIR: /app/src
    volumes:
      - ./src:/app/src
    depends_on:
      postgres:
        condition: service_healthy

  dbt:
    build: ./dbt
    env_file: .env
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-warehouse}
    depends_on:
      - python

  adminer:
    image: adminer
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy

  jupyter:
    image: jupyter/scipy-notebook:latest
    ports:
      - "8888:8888"
    environment:
      POSTGRES_CONN: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-warehouse}
    volumes:
      - ./notebooks:/home/jovyan/work
    depends_on:
      postgres:
        condition: service_healthy
    command: >
      bash -c "pip install psycopg2-binary -q &&
      start-notebook.sh
      --NotebookApp.token=''
      --NotebookApp.password=''"

volumes:
  postgres_data:
